---
name: Build
on:
  pull_request:
    paths:
      - .github/actions/build-sendspin-deb/**
      - .github/workflows/build.yaml
      - .dockerignore
      - Dockerfile
      - player/**
      - sendspin_service/**
      - tools/build_sendspin_service_deb.py
      - packaging/**
      - pyproject.toml
      - uv.lock

permissions:
  contents: read

jobs:
  build-deb:
    name: Sendspin service .deb
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Build .deb
        uses: ./.github/actions/build-sendspin-deb
        with:
          arch: amd64

  build-docker:
    name: Sendspin service Docker
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🧾 Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sendspin-service
          tags: type=sha,prefix=sha-
      - name: 🏗 Build Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_VERSION=0.0.0+dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
