---
name: Version checks

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - release/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin:
    name: Plugin
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🚀 Check plugin release version
        run: >-
          python3 -m tools.check_release_version
          --branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          --manifest custom_plugins/local_voice/manifest.json
