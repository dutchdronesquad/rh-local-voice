---
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-player:
    name: Build player assets
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: player/package-lock.json
      - name: 🏗 Install player dependencies
        run: npm ci
        working-directory: player
      - name: 🚀 Build player
        run: npm run build
        working-directory: player
      - name: 📦 Package plugin
        run: zip -r local_voice.zip custom_plugins
      - name: ⬆️ Upload release asset
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: local_voice.zip

  build-deb:
    name: Build ${{ matrix.arch }} .deb
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Build .deb
        uses: ./.github/actions/build-sendspin-deb
        with:
          arch: ${{ matrix.arch }}
      - name: ⬆️ Upload release asset
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/sendspin-service_*.deb
